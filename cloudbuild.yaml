steps:
  # 0. (Optional) Fetch GeoIP DB files from GCS into the build workspace so Docker can COPY them
  - name: "gcr.io/cloud-builders/gsutil"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        set -e
        mkdir -p data
        if [ -n "$_GEOIP_CITY_GCS" ]; then
          echo "Copying GeoIP City DB from $_GEOIP_CITY_GCS"
          gsutil cp "$_GEOIP_CITY_GCS" data/GeoLite2-City.mmdb || true
        else
          echo "_GEOIP_CITY_GCS not set; skipping City DB copy"
        fi
        if [ -n "$_GEOIP_ASN_GCS" ]; then
          echo "Copying GeoIP ASN DB from $_GEOIP_ASN_GCS"
          gsutil cp "$_GEOIP_ASN_GCS" data/GeoLite2-ASN.mmdb || true
        else
          echo "_GEOIP_ASN_GCS not set; skipping ASN DB copy"
        fi
        ls -l data || true

  # 1. Build the container image with Build Args pulled from Secret Manager
  - name: "gcr.io/cloud-builders/docker"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        docker build \
          --build-arg NEXT_PUBLIC_FIREBASE_API_KEY=$$FIREBASE_API_KEY \
          --build-arg NEXT_PUBLIC_FIREBASE_APP_ID=$$FIREBASE_APP_ID \
          --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=$$FIREBASE_AUTH_DOMAIN \
          --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID=$$FIREBASE_PROJECT_ID \
          --build-arg NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=$$FIREBASE_STORAGE_BUCKET \
          --build-arg NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=$$FIREBASE_MESSAGING_SENDER_ID \
          --build-arg NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=$$FIREBASE_MEASUREMENT_ID \
          -t $_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/$_IMAGE_NAME:$COMMIT_SHA \
          .
    secretEnv:
      - "FIREBASE_API_KEY"
      - "FIREBASE_APP_ID"
      - "FIREBASE_AUTH_DOMAIN"
      - "FIREBASE_PROJECT_ID"
      - "FIREBASE_STORAGE_BUCKET"
      - "FIREBASE_MESSAGING_SENDER_ID"
      - "FIREBASE_MEASUREMENT_ID"

  # 2. Push the image to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "push",
        "$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/$_IMAGE_NAME:$COMMIT_SHA",
      ]

  # 3. Deploy to Cloud Run
  # Note: We keep the secrets here for server-side usage
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "$_SERVICE_NAME"
      - "--image"
      - "$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/$_IMAGE_NAME:$COMMIT_SHA"
      - "--region"
      - "$_LOCATION"
      - "--allow-unauthenticated"
      - "--set-secrets"
      - "FIREBASE_SERVICE_ACCOUNT_B64=FIREBASE_SERVICE_ACCOUNT_B64:latest,FOURSQUARE_API_KEY=FOURSQUARE_API_KEY:latest,NEXT_PUBLIC_FIREBASE_API_KEY=NEXT_PUBLIC_FIREBASE_API_KEY:latest,NEXT_PUBLIC_FIREBASE_APP_ID=NEXT_PUBLIC_FIREBASE_APP_ID:latest,NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:latest,NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID:latest,NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID:latest,NEXT_PUBLIC_FIREBASE_PROJECT_ID=NEXT_PUBLIC_FIREBASE_PROJECT_ID:latest,NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest,OPENAI_MODEL=OPENAI_MODEL:latest,WEATHER_API_KEY=WEATHER_API_KEY:latest,WEATHER_BASE_URL=WEATHER_BASE_URL:latest"

# Logging configuration
options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _LOCATION: europe-west1
  _REPO_NAME: av-artifact-repo
  _IMAGE_NAME: av-image
  _SERVICE_NAME: av-cloud-run
  _GEOIP_CITY_GCS: ""
  _GEOIP_ASN_GCS: ""

# Connect the secretEnv variables to the actual Secret Manager secrets
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_FIREBASE_API_KEY/versions/latest
      env: "FIREBASE_API_KEY"
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_FIREBASE_APP_ID/versions/latest
      env: "FIREBASE_APP_ID"
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN/versions/latest
      env: "FIREBASE_AUTH_DOMAIN"
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_FIREBASE_PROJECT_ID/versions/latest
      env: "FIREBASE_PROJECT_ID"
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET/versions/latest
      env: "FIREBASE_STORAGE_BUCKET"
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID/versions/latest
      env: "FIREBASE_MESSAGING_SENDER_ID"
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID/versions/latest
      env: "FIREBASE_MEASUREMENT_ID"

images:
  - "$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/$_IMAGE_NAME:$COMMIT_SHA"
